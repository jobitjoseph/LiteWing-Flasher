<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ESP Web Flasher — Embed</title>
  <style>
    * { margin: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; background: transparent; }
    iframe {
      width: 100%; height: 100%;
      border: none;
      border-radius: 16px;
      min-height: 700px;
    }
  </style>
</head>
<body>
  <!--
    Embed the ESP Web Flasher in any website:

    WordPress / HTML embed:
      <iframe src="https://YOUR-DOMAIN/esp-flasher/" width="100%" height="750" frameborder="0" allow="serial"></iframe>

    IMPORTANT: The 'allow="serial"' attribute is REQUIRED for Web Serial API to work inside an iframe.
  -->
  <iframe
    src="./index.html"
    allow="serial"
    title="ESP Web Flasher"
  ></iframe>
</body>
</html>
